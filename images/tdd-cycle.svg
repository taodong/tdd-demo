<svg width="680" height="660" viewBox="0 0 680 660" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>TDD development cycle</title>
  <desc>A flowchart showing the new TDD development cycle. Human designs and creates test cases, feeding into an inner iteration loop where the code agent implements, then the automation agent executes tests and reports bugs back to the code agent. Once the inner loop is satisfied, the automation agent runs regression and reports bugs, then the code agent implements fixes, completing the outer loop back to the human design phase.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: Arial, sans-serif; fill: #1a1a1a; }
      .th  { font-size: 14px; font-weight: 600; }
      .ts  { font-size: 12px; font-weight: 400; fill: #555; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="680" height="660" fill="#ffffff"/>

  <!-- ── Legend ── -->
  <rect x="40" y="22" width="12" height="12" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="ts" x="58" y="33">Human</text>
  <rect x="130" y="22" width="12" height="12" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="ts" x="148" y="33">Code agent</text>
  <rect x="238" y="22" width="12" height="12" rx="2" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="ts" x="256" y="33">Automation agent</text>

  <!-- ── Outer loop label ── -->
  <text class="ts" x="340" y="68" text-anchor="middle" fill="#aaa">outer loop</text>

  <!-- ── Phase 1: Human design + test cases ── -->
  <rect x="200" y="80" width="280" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="340" y="104" text-anchor="middle" dominant-baseline="central">Human</text>
  <text class="ts" x="340" y="122" text-anchor="middle" dominant-baseline="central">Design and create test cases</text>

  <!-- arrow down -->
  <line x1="340" y1="136" x2="340" y2="168" stroke="#888" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- ── INNER LOOP box ── -->
  <rect x="60" y="168" width="560" height="260" rx="12" fill="none" stroke="#bbb" stroke-width="0.5" stroke-dasharray="5 3"/>
  <text class="ts" x="100" y="188" fill="#aaa">iteration loop</text>

  <!-- ── Phase 2: Code agent implement ── -->
  <rect x="220" y="196" width="240" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="340" y="220" text-anchor="middle" dominant-baseline="central">Code agent</text>
  <text class="ts" x="340" y="238" text-anchor="middle" dominant-baseline="central">Implement feature</text>

  <!-- arrow down -->
  <line x1="340" y1="252" x2="340" y2="300" stroke="#888" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- ── Phase 3: Automation agent execute + report ── -->
  <rect x="190" y="300" width="300" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="th" x="340" y="324" text-anchor="middle" dominant-baseline="central">Automation agent</text>
  <text class="ts" x="340" y="342" text-anchor="middle" dominant-baseline="central">Execute tests and report bugs</text>

  <!-- feedback loop: left side back up to code agent -->
  <path d="M190 328 L120 328 L120 224 L220 224" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text class="ts" x="80" y="280" text-anchor="middle">bugs</text>

  <!-- satisfied exit arrow -->
  <line x1="340" y1="356" x2="340" y2="400" stroke="#888" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text class="ts" x="368" y="382" fill="#aaa">all passed</text>

  <!-- ── Phase 4: Automation agent regression ── -->
  <rect x="170" y="400" width="340" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="th" x="340" y="424" text-anchor="middle" dominant-baseline="central">Automation agent</text>
  <text class="ts" x="340" y="442" text-anchor="middle" dominant-baseline="central">Run regression and report bugs</text>

  <!-- arrow down -->
  <line x1="340" y1="456" x2="340" y2="500" stroke="#888" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- ── Phase 5: Code agent fix bugs ── -->
  <rect x="220" y="500" width="240" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="340" y="524" text-anchor="middle" dominant-baseline="central">Code agent</text>
  <text class="ts" x="340" y="542" text-anchor="middle" dominant-baseline="central">Implement bug fixes</text>

  <!-- outer loop back arrow: right side back to human -->
  <path d="M460 528 L570 528 L570 108 L480 108" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text class="ts" x="608" y="322" text-anchor="middle" fill="#888">new</text>
  <text class="ts" x="608" y="337" text-anchor="middle" fill="#888">cycle</text>

</svg>
