<svg width="680" height="740" viewBox="0 0 680 740" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Claude Code and Waterwheel Agent flow</title>
  <desc>A flowchart showing Claude Code orchestrating a QA workflow. Claude Code generates code, confirms the QA environment, then performs a feature acceptance test by delegating to the Waterwheel agent which loads instructions, performs both tests, and reports results. Claude Code then checks the results and marks the task as completed.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: Arial, sans-serif; fill: #1a1a1a; }
      .th  { font-size: 14px; font-weight: 600; }
      .ts  { font-size: 12px; font-weight: 400; fill: #555; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="680" height="740" fill="#ffffff"/>

  <!-- ── Legend ── -->
  <rect x="40" y="22" width="12" height="12" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="ts" x="58" y="33">Claude Code</text>
  <rect x="155" y="22" width="12" height="12" rx="2" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="ts" x="173" y="33">Waterwheel agent</text>

  <!-- ── Step 1: Generate code ── -->
  <rect x="190" y="56" width="300" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="340" y="76" text-anchor="middle" dominant-baseline="central">Claude Code</text>
  <text class="ts" x="340" y="94" text-anchor="middle" dominant-baseline="central">Generate code</text>

  <line x1="340" y1="108" x2="340" y2="136" stroke="#888" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- ── Step 2: Confirm QA environment ── -->
  <rect x="190" y="136" width="300" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="340" y="156" text-anchor="middle" dominant-baseline="central">Claude Code</text>
  <text class="ts" x="340" y="174" text-anchor="middle" dominant-baseline="central">Confirm QA environment</text>

  <line x1="340" y1="188" x2="340" y2="216" stroke="#888" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- ── Step 3: Perform feature acceptance test ── -->
  <rect x="190" y="216" width="300" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="340" y="236" text-anchor="middle" dominant-baseline="central">Claude Code</text>
  <text class="ts" x="340" y="254" text-anchor="middle" dominant-baseline="central">Perform feature acceptance test</text>

  <line x1="340" y1="268" x2="340" y2="304" stroke="#888" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- ── WATERWHEEL sub-flow box ── -->
  <rect x="60" y="304" width="560" height="224" rx="12" fill="none" stroke="#bbb" stroke-width="0.5" stroke-dasharray="5 3"/>
  <text class="ts" x="100" y="322" fill="#aaa">waterwheel agent</text>

  <!-- ── Step 3a: Load instructions ── -->
  <rect x="190" y="330" width="300" height="52" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="th" x="340" y="350" text-anchor="middle" dominant-baseline="central">Waterwheel agent</text>
  <text class="ts" x="340" y="368" text-anchor="middle" dominant-baseline="central">Load instructions</text>

  <line x1="340" y1="382" x2="340" y2="410" stroke="#888" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- ── Step 3b: Perform both tests ── -->
  <rect x="190" y="410" width="300" height="52" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="th" x="340" y="430" text-anchor="middle" dominant-baseline="central">Waterwheel agent</text>
  <text class="ts" x="340" y="448" text-anchor="middle" dominant-baseline="central">Perform both tests</text>

  <line x1="340" y1="462" x2="340" y2="490" stroke="#888" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- ── Step 3c: Report test results ── -->
  <rect x="190" y="490" width="300" height="52" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="th" x="340" y="510" text-anchor="middle" dominant-baseline="central">Waterwheel agent</text>
  <text class="ts" x="340" y="528" text-anchor="middle" dominant-baseline="central">Report test results</text>

  <line x1="340" y1="542" x2="340" y2="576" stroke="#888" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- ── Step 4: Check test results ── -->
  <rect x="190" y="576" width="300" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="340" y="596" text-anchor="middle" dominant-baseline="central">Claude Code</text>
  <text class="ts" x="340" y="614" text-anchor="middle" dominant-baseline="central">Check test results</text>

  <line x1="340" y1="628" x2="340" y2="656" stroke="#888" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- ── Step 5: Mark task completed ── -->
  <rect x="190" y="656" width="300" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="340" y="676" text-anchor="middle" dominant-baseline="central">Claude Code</text>
  <text class="ts" x="340" y="694" text-anchor="middle" dominant-baseline="central">Mark task completed</text>

</svg>
